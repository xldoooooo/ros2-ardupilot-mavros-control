<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#accentGradient)"/>
  
  <!-- Main title -->
  <text x="640" y="180" font-family="Arial, sans-serif" font-size="64" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">
    ROS2-ArduPilot Integration
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="240" font-family="Arial, sans-serif" font-size="32" 
        text-anchor="middle" fill="#93c5fd">
    SITL Simulation + Real Hardware Framework
  </text>
  
  <!-- Feature boxes -->
  <!-- Box 1: SITL -->
  <g transform="translate(180, 320)">
    <rect width="280" height="180" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="140" cy="50" r="30" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="3"/>
    <text x="140" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
          text-anchor="middle" fill="#10b981">S</text>
    <text x="140" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">SITL</text>
    <text x="140" y="140" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Simulation</text>
    <text x="140" y="165" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Testing</text>
  </g>
  
  <!-- Box 2: Hardware -->
  <g transform="translate(500, 320)">
    <rect width="280" height="180" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="140" cy="50" r="30" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="3"/>
    <text x="140" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
          text-anchor="middle" fill="#3b82f6">H</text>
    <text x="140" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">Hardware</text>
    <text x="140" y="140" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Cube Orange</text>
    <text x="140" y="165" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Raspberry Pi</text>
  </g>
  
  <!-- Box 3: Tested -->
  <g transform="translate(820, 320)">
    <rect width="280" height="180" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="140" cy="50" r="30" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="3"/>
    <text x="140" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
          text-anchor="middle" fill="#fbbf24">✓</text>
    <text x="140" y="110" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">Flight Tested</text>
    <text x="140" y="140" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Production</text>
    <text x="140" y="165" font-family="Arial, sans-serif" font-size="16" 
          text-anchor="middle" fill="#cbd5e1">Ready</text>
  </g>
  
  <!-- Bottom info bar -->
  <rect x="0" y="560" width="1280" height="80" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Tech stack badges -->
  <g transform="translate(200, 585)">
    <rect width="140" height="35" rx="17.5" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">ROS2 Humble</text>
  </g>
  
  <g transform="translate(360, 585)">
    <rect width="120" height="35" rx="17.5" fill="rgba(255,255,255,0.15)"/>
    <text x="60" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">MAVROS</text>
  </g>
  
  <g transform="translate(500, 585)">
    <rect width="140" height="35" rx="17.5" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">ArduPilot</text>
  </g>
  
  <g transform="translate(660, 585)">
    <rect width="120" height="35" rx="17.5" fill="rgba(255,255,255,0.15)"/>
    <text x="60" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          text-anchor="middle" fill="#ffffff">Python</text>
  </g>
  
  <g transform="translate(800, 585)">
    <rect width="140" height="35" rx="17.5" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="2"/>
    <text x="70" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          text-anchor="middle" fill="#10b981">Open Source</text>
  </g>
  
  <!-- Author -->
  <text x="1120" y="608" font-family="Arial, sans-serif" font-size="14" 
        text-anchor="end" fill="#94a3b8">by Sidharth Mohan Nair</text>
</svg>
